<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>별도리 이메일 인증</title>
</head>
<body style="margin:0; padding:0; background-color:#0f0c29; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0c29; padding: 40px 0;">
    <tr>
        <td align="center">
            <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px; width:100%;">

                <!-- 로고 영역 -->
                <tr>
                    <td align="center" style="padding-bottom: 28px;">
                        <p style="margin:0; font-size:26px; font-weight:800; color:#ffffff; letter-spacing:2px;">
                            ✦ 별도리
                        </p>
                    </td>
                </tr>

                <!-- 메인 카드 -->
                <tr>
                    <td style="background: linear-gradient(160deg, #1e1b4b, #2e1065); border-radius:20px; padding: 48px 44px; border: 1px solid rgba(255,255,255,0.1);">

                        <!-- 아이콘 -->
                        <p style="margin:0 0 20px; text-align:center; font-size:48px;">🌌</p>

                        <!-- 제목 -->
                        <h1 style="margin:0 0 12px; text-align:center; font-size:22px; font-weight:700; color:#ffffff; letter-spacing:-0.3px;">
                            이메일 인증을 완료해주세요
                        </h1>

                        <!-- 설명 -->
                        <p style="margin:0 0 32px; text-align:center; font-size:14px; color:rgba(255,255,255,0.6); line-height:1.7;">
                            아래 버튼을 클릭하면 인증이 완료되고<br>별도리를 시작하실 수 있습니다.
                        </p>

                        <!-- 버튼 -->
                        <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                                <td align="center">
                                    <a th:href="${verificationUrl}"
                                       style="display:inline-block; padding:14px 40px; background: linear-gradient(135deg, #7c3aed, #a855f7); color:#ffffff; font-size:15px; font-weight:700; text-decoration:none; border-radius:12px; letter-spacing:0.3px;">
                                        이메일 인증하기
                                    </a>
                                </td>
                            </tr>
                        </table>

                        <!-- 경고 문구 -->
                        <p style="margin:28px 0 0; text-align:center; font-size:12px; color:rgba(255,255,255,0.35); line-height:1.6;">
                            이 링크는 24시간 동안 유효합니다.<br>
                            본인이 요청하지 않았다면 이 이메일을 무시해주세요.
                        </p>

                    </td>
                </tr>

                <!-- 푸터 -->
                <tr>
                    <td align="center" style="padding-top: 24px;">
                        <p style="margin:0; font-size:12px; color:rgba(255,255,255,0.25);">
                            © 2025 별도리. All rights reserved.
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
