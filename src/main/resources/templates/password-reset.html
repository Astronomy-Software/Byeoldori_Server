<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 재설정</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; background: #ffffff; border-radius: 12px; padding: 40px; }
        .title { color: #3b2fa0; font-size: 22px; font-weight: bold; margin-bottom: 16px; }
        .btn { display: inline-block; margin-top: 24px; padding: 14px 28px; background: #3b2fa0; color: #ffffff; border-radius: 8px; text-decoration: none; font-size: 15px; }
        .notice { margin-top: 20px; font-size: 13px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <div class="title">별도리 비밀번호 재설정</div>
    <p>안녕하세요 <strong th:text="${name}"></strong>님,</p>
    <p>비밀번호 재설정을 요청하셨습니다.<br>아래 버튼을 클릭하여 새 비밀번호를 설정해주세요.</p>
    <p>링크는 <strong>30분</strong> 동안 유효합니다.</p>
    <a th:href="${resetUrl}" class="btn">비밀번호 재설정하기</a>
    <p class="notice">본인이 요청하지 않으셨다면 이 메일을 무시해주세요.<br>링크를 클릭하지 않으면 계정에 아무런 변화가 없습니다.</p>
</div>
</body>
</html>
