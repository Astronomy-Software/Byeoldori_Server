# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway/SQL init 비활성화 (H2에서 MySQL 전용 SQL 실행 방지)
spring.flyway.enabled=false
spring.sql.init.mode=never

# Quartz 인메모리 모드
spring.quartz.job-store-type=memory

# 더미 필수 프로퍼티
jwt.secret=test-secret-key-for-ci-minimum-256-bits-long-padding-here-12345
weather.api.key=test-key
weather.api.url=http://localhost:9999/test
spring.mail.username=test@test.com
spring.mail.password=testpassword
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
app.host-url=http://localhost:8080
storage.public-base-url=http://localhost:8080/files
