# upstream으로 백엔드 지정
upstream backend {
    server app:8080;
    keepalive 64;
}

# upstream으로 Stellarium RemoteControl 지정
upstream stellarium {
    server stellarium:8090;
    keepalive 8;
}

# 1. HTTP(80) 서버 (IP 접속용)
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20M;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://backend/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. HTTP(80) 서버 (도메인 접속 시 HTTPS 리디렉션용)
server {
    listen 80;
    server_name byeoldori-app.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. HTTPS(443) 서버 (도메인 접속 시 실제 요청 처리)
server {
    listen 443 ssl http2;
    server_name byeoldori-app.duckdns.org;

    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/byeoldori-app.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/byeoldori-app.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Spring Boot API ───────────────────────────────────────────
    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /swagger-ui/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://backend/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Stellarium RemoteControl API 프록시 ──────────────────────
    # Unity 앱 → https://byeoldori-app.duckdns.org/stellarium/api/...
    #           → stellarium:8090/api/...
    location /stellarium/ {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://stellarium/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;

        # Unity 앱(HTTPS)에서 HTTP 내부 서비스 접근 허용
        add_header Access-Control-Allow-Origin  *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }

    # ── 스카이박스 정적 파일 서빙 ────────────────────────────────
    # Stellarium이 /skybox/live/ 에 생성한 PNG 6장 + unityData.txt
    # Unity 앱 → https://byeoldori-app.duckdns.org/skybox/live/Unity1-north.png
    location /skybox/ {
        alias /skybox/;
        add_header Access-Control-Allow-Origin *;
        # 스카이박스는 자주 갱신되므로 캐시 비활성화
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }
}
