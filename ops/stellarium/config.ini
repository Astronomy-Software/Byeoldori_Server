# Stellarium 설정 파일 (Docker headless 용)
# RemoteControl 플러그인 활성화 + 스카이박스 출력 경로 설정

[main]
invert_screenshots_colors                = false
screenshot_dir                           = /skybox/live

[video]
fullscreen                               = false
screen_h                                 = 720
screen_w                                 = 1280
screen_x                                 = 0
screen_y                                 = 0

[RemoteControl]
enabled                                  = true
port                                     = 8090
require_password                         = false
cors_enabled                             = true
cors_origin                              = *

[plugins_load_at_startup]
RemoteControl                            = 1

[navigation]
preset_sky_time                          = 2451545.0
startup_time_mode                        = actual
flag_manual_zoom                         = false

[astro]
flag_star_magnitude_limit                = false
flag_bright_nebulae                      = true
