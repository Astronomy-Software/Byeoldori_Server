name: Deploy backend

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch: {}

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

env:
  PROJECT_ID: byeoldori-server
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev
  IMAGE: asia-northeast3-docker.pkg.dev/byeoldori-server/byeoldori-repo/server
  SERVICE_NAME: byeoldori-server
  CLOUD_SQL_INSTANCE: byeoldori-server:asia-northeast3:byeoldori-mysql

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Notify Discord - Deploy Start
        env:
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK_BACKEND_URL }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          SHORT="${SHA:0:7}"
          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 별도리 서버 배포 시작\",
                \"description\": \"새로운 버전 배포를 시작합니다.\",
                \"color\": 3447003,
                \"fields\": [
                  {\"name\": \"브랜치\", \"value\": \"${REF}\", \"inline\": true},
                  {\"name\": \"커밋\", \"value\": \"[\`${SHORT}\`](${REPO_URL}/commit/${SHA})\", \"inline\": true},
                  {\"name\": \"작업자\", \"value\": \"${ACTOR}\", \"inline\": true}
                ]
              }]
            }" \
            "$DISCORD_URL"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --min-instances=1
            --max-instances=5
            --memory=1Gi
            --cpu=1
            --timeout=300
            --vpc-connector=byeoldori-connector
            --vpc-egress=private-ranges-only
            --service-account=byeoldori-cloudrun@byeoldori-server.iam.gserviceaccount.com
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }}
            --remove-secrets=FIREBASE_CREDENTIALS_JSON
          env_vars: |
            SERVER_PORT=8080
            SPRING_PROFILES_ACTIVE=prod
            SPRING_REDIS_HOST=${{ secrets.REDIS_HOST }}
            SPRING_REDIS_PORT=6379
          secrets: |
            SPRING_DATASOURCE_URL=SPRING_DATASOURCE_URL:latest
            SPRING_DATASOURCE_USERNAME=SPRING_DATASOURCE_USERNAME:latest
            SPRING_DATASOURCE_PASSWORD=SPRING_DATASOURCE_PASSWORD:latest
            JWT_SECRET=JWT_SECRET:latest
            WEATHER_API_KEY=WEATHER_API_KEY:latest
            MAIL_USERNAME=MAIL_USERNAME:latest
            MAIL_PASSWORD=MAIL_PASSWORD:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            APP_HOST_URL=APP_HOST_URL:latest
            PUBLIC_BASE_URL=PUBLIC_BASE_URL:latest
            STORAGE_TYPE=STORAGE_TYPE:latest
            GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest

      - name: Health check & auto rollback
        env:
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK_BACKEND_URL }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          SHORT="${SHA:0:7}"

          echo "헬스체크 시작: ${SERVICE_URL}/actuator/health"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${SERVICE_URL}/actuator/health")
            echo "시도 ${i}/12 - 응답: ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "헬스체크 통과"
              exit 0
            fi
            sleep 5
          done

          echo "헬스체크 실패 - 이전 버전으로 롤백"
          PREV_REVISION=$(gcloud run revisions list \
            --service=${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(name)' \
            --sort-by='~creationTimestamp' \
            --limit=2 | tail -1)
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --to-revisions=${PREV_REVISION}=100

          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔄 별도리 서버 자동 롤백 완료\",
                \"description\": \"헬스체크 실패로 이전 버전으로 자동 복구했습니다.\",
                \"color\": 16776960,
                \"fields\": [
                  {\"name\": \"실패 커밋\", \"value\": \"[\`${SHORT}\`](${REPO_URL}/commit/${SHA})\", \"inline\": true},
                  {\"name\": \"롤백 대상\", \"value\": \"${PREV_REVISION}\", \"inline\": true},
                  {\"name\": \"워크플로우\", \"value\": \"[로그 확인](${RUN_URL})\", \"inline\": false}
                ]
              }]
            }" \
            "$DISCORD_URL"
          exit 1

      - name: Export OpenAPI spec & deploy docs
        if: success()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK_BACKEND_URL }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          DOCS_URL="https://byeoldori-docs.pages.dev"
          SHORT="${SHA:0:7}"

          # 1. 이전 spec 저장 (diff 비교용)
          curl -sf "${DOCS_URL}/openapi.json" -o openapi.old.json || echo '{"paths":{}}' > openapi.old.json

          # 2. 새 spec 추출
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} --format='value(status.url)')
          curl -s "${SERVICE_URL}/v3/api-docs" -o docs/openapi.json
          echo "OpenAPI spec 추출 완료"

          # 3. OpenAPI diff 분석
          DIFF_SUMMARY=$(python3 scripts/diff_openapi.py openapi.old.json docs/openapi.json)

          # 4. Cloudflare Pages 배포
          npm install -g wrangler --silent
          wrangler pages deploy docs/ \
            --project-name=byeoldori-docs \
            --commit-dirty=true

          # 5. Discord 알림 (diff 포함)
          DIFF_JSON=$(echo "$DIFF_SUMMARY" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"📄 API 문서 업데이트\",
                \"color\": 5793266,
                \"fields\": [
                  {\"name\": \"변경사항\", \"value\": \"\`\`\`${DIFF_SUMMARY}\`\`\`\", \"inline\": false},
                  {\"name\": \"커밋\", \"value\": \"[\`${SHORT}\`](${REPO_URL}/commit/${SHA})\", \"inline\": true},
                  {\"name\": \"작업자\", \"value\": \"${ACTOR}\", \"inline\": true},
                  {\"name\": \"문서\", \"value\": \"[열기](${DOCS_URL})\", \"inline\": true}
                ]
              }]
            }" \
            "$DISCORD_URL"

      - name: Notify Discord - Deploy Success
        if: success()
        env:
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK_BACKEND_URL }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          SHORT="${SHA:0:7}"
          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ 별도리 서버 배포 완료\",
                \"description\": \"새로운 버전이 성공적으로 배포되었습니다.\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"커밋\", \"value\": \"[\`${SHORT}\`](${REPO_URL}/commit/${SHA})\", \"inline\": true},
                  {\"name\": \"작업자\", \"value\": \"${ACTOR}\", \"inline\": true}
                ]
              }]
            }" \
            "$DISCORD_URL"

      - name: Notify Discord - Deploy Failure
        if: failure()
        env:
          DISCORD_URL: ${{ secrets.DISCORD_WEBHOOK_BACKEND_URL }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          SHORT="${SHA:0:7}"
          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ 별도리 서버 배포 실패\",
                \"description\": \"배포 중 오류가 발생했습니다. 확인이 필요합니다.\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"커밋\", \"value\": \"[\`${SHORT}\`](${REPO_URL}/commit/${SHA})\", \"inline\": true},
                  {\"name\": \"작업자\", \"value\": \"${ACTOR}\", \"inline\": true},
                  {\"name\": \"워크플로우\", \"value\": \"[${WORKFLOW}](${RUN_URL})\", \"inline\": false}
                ]
              }]
            }" \
            "$DISCORD_URL"
