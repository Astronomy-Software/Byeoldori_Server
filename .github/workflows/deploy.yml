name: Deploy backend

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch: {}

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

env:
  PROJECT_ID: byeoldori-server
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev
  IMAGE: asia-northeast3-docker.pkg.dev/byeoldori-server/byeoldori-repo/server
  SERVICE_NAME: byeoldori-server
  CLOUD_SQL_INSTANCE: byeoldori-server:asia-northeast3:byeoldori-mysql

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --min-instances=1
            --max-instances=5
            --memory=1Gi
            --cpu=1
            --timeout=300
            --vpc-connector=byeoldori-connector
            --vpc-egress=private-ranges-only
            --service-account=byeoldori-cloudrun@byeoldori-server.iam.gserviceaccount.com
            --add-cloudsql-instances=${{ env.CLOUD_SQL_INSTANCE }}
          env_vars: |
            SERVER_PORT=8080
            JPA_DDL_AUTO=update
            SPRING_REDIS_HOST=${{ secrets.REDIS_HOST }}
            SPRING_REDIS_PORT=6379
          secrets: |
            SPRING_DATASOURCE_URL=SPRING_DATASOURCE_URL:latest
            SPRING_DATASOURCE_USERNAME=SPRING_DATASOURCE_USERNAME:latest
            SPRING_DATASOURCE_PASSWORD=SPRING_DATASOURCE_PASSWORD:latest
            JWT_SECRET=JWT_SECRET:latest
            WEATHER_API_KEY=WEATHER_API_KEY:latest
            MAIL_USERNAME=MAIL_USERNAME:latest
            MAIL_PASSWORD=MAIL_PASSWORD:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            APP_HOST_URL=APP_HOST_URL:latest
            PUBLIC_BASE_URL=PUBLIC_BASE_URL:latest
            STORAGE_TYPE=STORAGE_TYPE:latest
            GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest
